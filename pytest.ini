[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --timeout=60
    --tb=short
markers =
    slow: Benchmarks de rendimiento — solo en RPi5 real (pytest -m slow)
    hardware: Requiere hardware físico conectado
    integration: Tests de integración (Flask client, SSE)
    security: Tests de seguridad (path traversal, sanitización)
    compliance: Conformidad ISO/IEC 27037, NIST SP 800-101
